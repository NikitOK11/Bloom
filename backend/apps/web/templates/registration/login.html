{% extends "web/base.html" %}
{% load i18n %}

{% block title %}{% trans "Вход" %}{% endblock %}

{% block content %}
<section class="content-panel auth-card">
<h1>{% trans "Вход" %}</h1>
<p class="muted">{% trans "Войдите, чтобы создавать команды и управлять заявками." %}</p>
<form class="stack" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">{% trans "Войти" %}</button>
</form>
</section>
{% endblock %}
