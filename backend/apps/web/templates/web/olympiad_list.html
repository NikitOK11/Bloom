{% extends "web/base.html" %}

{% block title %}Olympiads{% endblock %}

{% block content %}
<h1>Olympiads</h1>
{% if olympiads %}
    <ul>
        {% for olympiad in olympiads %}
            <li>
                <a href="{% url 'web:olympiad-detail' olympiad.pk %}">{{ olympiad.title }}</a>
                ({{ olympiad.season }})
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>No olympiads found.</p>
{% endif %}
{% endblock %}
