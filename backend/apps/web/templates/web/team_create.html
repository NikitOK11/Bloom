{% extends "web/base.html" %}
{% load i18n %}

{% block title %}{% trans "Создать команду" %}{% endblock %}

{% block content %}
<section class="card-elevated auth-card">
<h1>{% trans "Создать команду" %}</h1>
{% if event %}
    <p class="muted">{% trans "Событие:" %} <a href="{% url 'web:event-detail' event.pk %}">{% firstof event.name event.title %}</a></p>
{% endif %}

<form class="stack" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">{% trans "Создать команду" %}</button>
</form>
</section>
{% endblock %}
