{% extends "web/base.html" %}

{% block title %}Create Team{% endblock %}

{% block content %}
<h1>Create Team</h1>
{% if event %}
    <p>Event: <a href="{% url 'web:event-detail' event.pk %}">{% firstof event.name event.title %}</a></p>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Create team</button>
</form>
{% endblock %}
