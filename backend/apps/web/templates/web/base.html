<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Bloom Web Demo{% endblock %}</title>
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'web:home' %}">Home</a> |
            <a href="{% url 'web:event-list' %}">Events</a> |
            <a href="/admin/">Admin</a> |
            {% if request.user.is_authenticated %}
                <span>{{ request.user.email }}</span>
                <form action="{% url 'web:logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'web:login' %}">Login</a>
            {% endif %}
        </nav>
    </header>

    {% if messages %}
        <section>
            <ul>
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        </section>
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
