services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bloom
      POSTGRES_USER: bloom
      POSTGRES_PASSWORD: bloom
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloom -d bloom"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      SECRET_KEY: django-insecure-prod-scaffold
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1,nginx,backend
      DATABASE_URL: postgres://bloom:bloom@db:5432/bloom
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/health/').read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - backend_prod_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: static
    depends_on:
      - backend

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_prod_static:/srv/static:ro

volumes:
  postgres_prod_data:
  backend_prod_static:
