services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bloom
      POSTGRES_USER: bloom
      POSTGRES_PASSWORD: bloom
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloom -d bloom"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./backend
    environment:
      SECRET_KEY: django-insecure-prod-scaffold
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://bloom:bloom@db:5432/bloom
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - web

volumes:
  postgres_prod_data:
